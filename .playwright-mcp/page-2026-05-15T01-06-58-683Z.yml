        - 'heading "August 2, 2026: what the EU AI Act high-risk deadline actually requires" [level=1] [ref=e39]'
        - generic [ref=e40]:
          - generic [ref=e41]: NXπ Research
          - generic [ref=e42]: ·
          - time [ref=e43]: April 1, 2026
          - generic [ref=e44]: ·
          - generic [ref=e45]: 8 min read
      - article [ref=e47]:
        - paragraph [ref=e48]: August 2, 2026 is the date by which organizations deploying high-risk AI systems in the EU must demonstrate compliance with the EU AI Act (Article 113). Many enterprise AI teams are behind.
        - paragraph [ref=e49]: This post explains what the Act actually requires — without the legal fog.
        - heading "What counts as high-risk?" [level=2] [ref=e50]
        - paragraph [ref=e51]: "The EU AI Act classifies AI systems as high-risk if they are used in specific areas: employment (CV screening, performance monitoring), credit and insurance decisions, access to education, law enforcement, migration, and administration of justice."
        - paragraph [ref=e52]: For most enterprise AI use cases — financial analysis, supply chain optimization, customer intelligence, workflow automation — the high-risk classification applies when the AI output directly informs a consequential decision about a person.
        - paragraph [ref=e53]: An AI agent that generates financial close reports for CFO review is lower risk than one that automatically approves or rejects supplier invoices. The distinction is human oversight.
        - heading "The six core requirements" [level=2] [ref=e54]
        - generic [ref=e55]:
          - generic [ref=e56]:
            - generic [ref=e57]: "1"
            - generic [ref=e58]:
              - paragraph [ref=e59]: Risk management system
              - paragraph [ref=e60]: A documented process for identifying, analyzing, and mitigating risks throughout the AI system lifecycle. Updated continuously.
          - generic [ref=e61]:
            - generic [ref=e62]: "2"
            - generic [ref=e63]:
              - paragraph [ref=e64]: Data governance
              - paragraph [ref=e65]: "Training data (and fine-tuning data) must be documented, assessed for bias, and subject to appropriate quality controls. For RAG systems: the knowledge base sources must be documented and auditable."
          - generic [ref=e66]:
            - generic [ref=e67]: "3"
            - generic [ref=e68]:
              - paragraph [ref=e69]: Technical documentation
              - paragraph [ref=e70]: A comprehensive technical file describing the system's purpose, architecture, data flows, performance metrics, and limitations. Must be made available to regulators on request.
          - generic [ref=e71]:
            - generic [ref=e72]: "4"
            - generic [ref=e73]:
              - paragraph [ref=e74]: Record-keeping
              - paragraph [ref=e75]: "Automatic logging sufficient to ensure traceability of outputs. For agentic AI: this means the full agent call tree, tool invocations, retrieved sources, and model outputs — for a defined retention period."
          - generic [ref=e76]:
            - generic [ref=e77]: "5"
            - generic [ref=e78]:
              - paragraph [ref=e79]: Transparency and user information
              - paragraph [ref=e80]: Users must know they are interacting with an AI system. Outputs must be labeled as AI-generated when used in consequential decisions.
          - generic [ref=e81]:
            - generic [ref=e82]: "6"
            - generic [ref=e83]:
              - paragraph [ref=e84]: Human oversight
              - paragraph [ref=e85]: High-risk systems must be designed to allow human oversight, correction, and overriding of AI outputs. The system must support — not undermine — human control.
        - heading "What NXπ does" [level=2] [ref=e86]
        - paragraph [ref=e87]: "NXπ is designed around these requirements, not retrofitted to them:"
        - paragraph [ref=e88]:
          - strong [ref=e89]: Record-keeping
          - text: is handled by the append-only audit log — every agent run, every tool call, every retrieved document, every model response, written to your PostgreSQL with tamper-evident timestamps.
        - paragraph [ref=e90]:
          - strong [ref=e91]: Technical documentation
          - text: "is generated from the platform's own configuration: MCP connections, model allowlists, RBAC policies, workflow DAGs — all machine-readable and exportable."
        - paragraph [ref=e92]:
          - strong [ref=e93]: Data governance
          - text: for RAG is addressed through source attribution on every answer — the system records which documents informed each response, including document metadata and retrieval scores.
        - paragraph [ref=e94]:
          - strong [ref=e95]: Human oversight
          - text: is built into the workflow builder — approval nodes can be inserted at any point in an automated workflow, requiring human sign-off before consequential actions execute.
        - paragraph [ref=e96]: The August 2 deadline is not a one-time certification. It marks the beginning of ongoing compliance. Organizations that built their AI stack without audit infrastructure will spend the next 12–18 months retrofitting. Organizations that built on NXπ are already there.
      - link "← Back to Blog" [ref=e98] [cursor=pointer]:
        - /url: /blog
