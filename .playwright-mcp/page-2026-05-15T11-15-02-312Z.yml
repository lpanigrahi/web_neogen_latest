          - heading "Q1 2026 — Foundation Release" [level=2] [ref=e108]
          - list [ref=e109]:
            - listitem [ref=e110]:
              - generic [ref=e112]:
                - paragraph [ref=e113]: MCP Integration Fabric
                - paragraph [ref=e114]: NXπ is a first-class MCP host. Connect SAP HANA Cloud, S/4HANA, Salesforce, and any MCP-compatible system through the open protocol. Native support for SSE and WebSocket transports.
            - listitem [ref=e115]:
              - generic [ref=e117]:
                - paragraph [ref=e118]: Hybrid RAG
                - paragraph [ref=e119]: Vector search + BM25 with Reciprocal Rank Fusion. Default retrieval strategy achieves 91%+ recall@10. Source attribution on every answer.
            - listitem [ref=e120]:
              - generic [ref=e122]:
                - paragraph [ref=e123]: Agent Builder
                - paragraph [ref=e124]: Create single agents and multi-agent pipelines. Token accounting per agent per run. Full call tree in the audit log.
            - listitem [ref=e125]:
              - generic [ref=e127]:
                - paragraph [ref=e128]: Zero-Trust Governance
                - paragraph [ref=e129]: Per-user RBAC, label-based policies, MCP server scoping, model allowlists, PII detection and masking, append-only audit log.
            - listitem [ref=e130]:
              - generic [ref=e132]:
                - paragraph [ref=e133]: Self-hosted deployment
                - paragraph [ref=e134]: Run NXπ entirely within your infrastructure. PostgreSQL + pgvector + Ollama. Nothing leaves your perimeter.
