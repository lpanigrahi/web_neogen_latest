            - time [ref=e77]: June 2026
            - generic [ref=e78]: v1.1
          - heading "Q2 2026 — SAP + Salesforce Connectors" [level=2] [ref=e79]
          - list [ref=e80]:
            - listitem [ref=e81]:
              - generic [ref=e83]:
                - paragraph [ref=e84]: SAP HANA Cloud MCP connector
                - paragraph [ref=e85]: Native integration with SAP HANA Cloud via MCP. Real-time data access, no replication. Joule-compatible.
            - listitem [ref=e86]:
              - generic [ref=e88]:
                - paragraph [ref=e89]: Salesforce MCP connector
                - paragraph [ref=e90]: Agentforce-native integration. Access Opportunities, Accounts, Cases, and custom objects through MCP. Bi-directional tool support.
            - listitem [ref=e91]:
              - generic [ref=e93]:
                - paragraph [ref=e94]: Visual Workflow Builder
                - paragraph [ref=e95]: "DAG-based workflow automation with 9 node types: Input, Output, LLM, Tool, Condition, HTTP, Template, Agent, Note. Cron, webhook, and API triggers."
            - listitem [ref=e96]:
              - generic [ref=e98]:
                - paragraph [ref=e99]: Finance-specific reasoning flows
                - paragraph [ref=e100]: "Pre-built workflows for: margin analysis, variance analysis, financial reconciliation, working capital insights, and scenario modeling against SAP data."
        - generic [ref=e102]:
