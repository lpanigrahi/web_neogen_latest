          - generic [ref=e146]:
            - generic [ref=e147]:
              - heading "Do you charge per token?" [level=3] [ref=e148]
              - paragraph [ref=e149]: No. NXπ charges a platform subscription only. You pay your LLM provider directly — Anthropic, OpenAI, Google, or nobody if you run Ollama locally. Our pricing is completely decoupled from your inference costs.
            - generic [ref=e150]:
              - heading "Can I self-host on all tiers?" [level=3] [ref=e151]
              - paragraph [ref=e152]: Yes. Self-hosted deployment is available on every tier, including Team. You can run NXπ entirely within your infrastructure — on-premises, private cloud, or air-gapped. No data needs to leave your perimeter.
            - generic [ref=e153]:
              - heading "What is included in the platform fee?" [level=3] [ref=e154]
              - paragraph [ref=e155]: The platform fee covers the orchestration engine, hybrid RAG, workflow builder, governance and RBAC, audit logging, MCP connectivity, all compliance tooling, and all future releases during your subscription term.
            - generic [ref=e156]:
              - heading "How is this different from per-seat AI tools?" [level=3] [ref=e157]
              - paragraph [ref=e158]: Per-seat AI tools scale their cost with your headcount and often with your usage. NXπ's platform subscription is predictable. As you automate more, your cost-per-decision goes down — not up.
