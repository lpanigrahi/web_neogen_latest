            - paragraph [ref=e88]: Presidio-powered PII detection runs on every prompt before it reaches any LLM. Names, emails, financial identifiers, and health data are detected and masked. The original data stays in your store.
          - generic [ref=e89]:
            - heading "Append-only audit logs" [level=3] [ref=e92]
            - paragraph [ref=e93]: Every agent action, tool call, and decision is written to an append-only, cryptographically chained log in your PostgreSQL. Logs are queryable but immutable. Your regulators can verify every decision.
          - generic [ref=e94]:
            - heading "Context window compaction" [level=3] [ref=e97]
            - paragraph [ref=e98]: Sensitive conversation history is compacted and summarized at configurable intervals. Raw prompt content does not accumulate indefinitely in the context window.
