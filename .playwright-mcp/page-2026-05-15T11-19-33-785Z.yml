  - main [ref=e32]:
    - generic [ref=e33]:
      - generic [ref=e37]:
        - generic [ref=e39]: About Negentrophi
        - heading "We exist to reverse entropy in the enterprise." [level=1] [ref=e42]
        - paragraph [ref=e44]: Organizations drown in fragmented tools, siloed data, and ungoverned AI experiments. Negentrophi builds the unifying layer that transforms this disorder into coherent intelligence — governed, transparent, and humane.
        - paragraph [ref=e46]: Negentropy is the tendency of complex systems to create order from chaos. It is the organizing principle of life itself. We named our company after it because we believe that the most important work in enterprise AI is not building smarter models — it is building the infrastructure that transforms organizational chaos into coherent, trustworthy intelligence.
      - generic [ref=e48]:
        - generic [ref=e49]:
          - heading "Five founding principles" [level=2] [ref=e50]
          - paragraph [ref=e51]: These are not values we aspire to. They are the constraints we design within.
        - generic [ref=e52]:
          - generic [ref=e53]:
            - generic [ref=e54]:
              - generic [ref=e55]: "01"
              - heading "People First, Always" [level=3] [ref=e56]
              - paragraph [ref=e57]: Technology is a means, not an end. Every design decision is weighed by its impact on the humans who use it — and the humans whose lives are touched by decisions it informs. Governance is not a constraint. It is care.
            - generic [ref=e58]:
              - generic [ref=e59]: "02"
              - heading "Open by Default, Governed by Design" [level=3] [ref=e60]
              - paragraph [ref=e61]: We build on open protocols — MCP, PostgreSQL, standard LLM APIs. Interoperability is non-negotiable. But openness without governance is chaos. Every integration point is a governance point.
            - generic [ref=e62]:
              - generic [ref=e63]: "03"
              - heading "The Compound Value of Integration" [level=3] [ref=e64]
              - paragraph [ref=e65]: The value of connected systems compounds. One integration is useful. Ten integrations, properly governed, unlock capabilities that could not exist in any single system. This is why we build the join layer.
          - generic [ref=e66]:
            - generic [ref=e67]:
              - generic [ref=e68]: "04"
              - heading "Earn Trust Through Transparency" [level=3] [ref=e69]
              - paragraph [ref=e70]: Every action is logged. Every decision is traceable. Every model output is attributed to its sources. We do not ask customers to trust us — we build systems that make trust verifiable.
            - generic [ref=e71]:
              - generic [ref=e72]: "05"
              - heading "Long-Term Thinking, Iterative Delivery" [level=3] [ref=e73]
              - paragraph [ref=e74]: Enterprise infrastructure is not replaced overnight. We design for the 10-year horizon while shipping every sprint. Patient about vision, impatient about execution.
      - generic [ref=e75]:
        - generic [ref=e76]:
          - heading "Leadership" [level=2] [ref=e77]
          - paragraph [ref=e78]: Small team. Deep domain expertise. Long time horizon.
        - generic [ref=e79]:
