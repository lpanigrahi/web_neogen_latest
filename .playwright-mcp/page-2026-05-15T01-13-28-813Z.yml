      - generic [ref=e32]:
        - generic [ref=e33]: SAP + Salesforce Fusion
        - heading "The ROI lives in the join." [level=1] [ref=e34]
        - paragraph [ref=e35]: Every CXO knows it. The single most valuable AI use case in the enterprise is not inside SAP or inside Salesforce — it is the join between them.
        - paragraph [ref=e36]: Revenue you cannot recognize until the order ships. Pipeline you cannot trust until you reconcile against billing. Customer health you cannot measure until CRM meets ERP.
      - generic [ref=e38]:
        - heading "The gap that costs enterprises millions" [level=3] [ref=e39]
        - paragraph [ref=e40]: SAP owns the transaction. Salesforce owns the relationship. Between them lives the most valuable data in the enterprise — and most organizations cannot access it without a multi-week data engineering project.
        - paragraph [ref=e41]: NXπ eliminates that gap. Through MCP connectors to both systems, every agent has access to the full picture — live, reconciled, and query-ready — in under 200 milliseconds.
      - generic [ref=e42]:
        - heading "How the join works" [level=2] [ref=e43]
        - paragraph [ref=e44]: NXπ's hybrid RAG layer indexes both systems simultaneously. When an agent queries customer data, it retrieves from SAP and Salesforce in a single round-trip — joining on account ID, order number, or any shared key — without ETL, without replication, without data leaving either system.
