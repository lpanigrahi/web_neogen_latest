      - generic [ref=e67]:
        - heading "Fusion use cases" [level=2] [ref=e68]
        - generic [ref=e69]:
          - generic [ref=e70]:
            - generic [ref=e71]: CFO / CRO
            - heading "Revenue Recognition" [level=3] [ref=e72]
            - paragraph [ref=e73]: A deal closes in Salesforce. But the revenue cannot be recognized until the order ships in SAP. NXπ fuses both signals in real time — so finance and sales always share the same version of the truth.
          - generic [ref=e74]:
            - generic [ref=e75]: CRO / CSM
            - heading "Customer Health Scoring" [level=3] [ref=e76]
            - paragraph [ref=e77]: Salesforce shows the relationship. SAP shows the behavior. The customer who looks healthy in CRM but has slowing order velocity in ERP is the one who churns. NXπ surfaces this before it happens.
          - generic [ref=e78]:
            - generic [ref=e79]: CFO / COO
            - heading "Collections Intelligence" [level=3] [ref=e80]
            - paragraph [ref=e81]: Outstanding invoices in SAP, plus relationship context in Salesforce, plus AI-drafted communication — automated collections workflows that preserve the customer relationship.
      - generic [ref=e84]:
        - heading "Why the join matters more than either system alone" [level=2] [ref=e85]
        - generic [ref=e86]:
          - paragraph [ref=e87]: Most enterprise AI projects die because they operate inside one system. A Salesforce agent that does not know what is in SAP gives you a confident answer about a customer that is factually wrong. An SAP agent that ignores CRM context optimizes procurement without knowing which suppliers your key accounts depend on.
          - paragraph [ref=e88]: The highest-ROI AI deployments in the enterprise are not vertical applications. They are horizontal joins — agents that read both systems, reason across the combined context, and act with full visibility into the transaction AND the relationship.
          - paragraph [ref=e89]: NXπ is the only platform built for this join from day one.
