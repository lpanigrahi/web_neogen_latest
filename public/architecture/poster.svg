<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2480 3508" fill="none">
  <!-- A1 size at 150dpi -->
  <rect width="2480" height="3508" fill="#050914"/>

  <!-- Aurora gradient background -->
  <defs>
    <radialGradient id="aurora1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#5B8DEF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050914" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aurora2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#9D7CFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#050914" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B8DEF"/>
      <stop offset="100%" stop-color="#9D7CFF"/>
